name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v3

    - name: Inject .env
      run: cp /home/noble/envs/deaubit/.env .env

    - name: Install Dependencies
      run: npm ci

    - name: Run Prisma Migration
      run: |
        npx prisma generate
        npx prisma migrate deploy

    - name: Build
      run: |
        npm run build

        mkdir -p .next/standalone/public
        mkdir -p .next/standalone/.next/static

        cp .env .next/standalone/

        if [ -d "public" ]; then
          cp -r public/* .next/standalone/public/
        fi

        cp -r .next/static/* .next/standalone/.next/static/

    - name: Debug PATH
      run: |
        echo "PATH: $PATH"
        ls -la /usr/bin/rsync
        /usr/bin/rsync --version

    - name: Deploy to Kripton
      run: |
        /usr/bin/rsync -av --delete \
          -e "ssh -i /home/noble/.ssh/radon_deploy -o StrictHostKeyChecking=no" \
          .next/standalone/ \
          noble@100.64.0.3:/var/www/deaubit/

    - name: Restart PM2
      run: |
        ssh -i /home/noble/.ssh/radon_deploy \
          -o StrictHostKeyChecking=no \
          noble@100.64.0.3 \
          "pm2 reload deaubit || pm2 start /var/www/deaubit/ecosystem.config.js"
