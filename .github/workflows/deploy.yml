name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v3

    - name: Inject .env
      run: cp /opt/envfiles/deaubit.env .env

    - name: Install Dependencies
      run: npm ci

    - name: Run Prisma Migration
      run: |
        npx prisma generate
        npx prisma migrate deploy

    - name: Build
      run: |
        npm run build
        mkdir -p .next/standalone/public
        mkdir -p .next/standalone/.next/static
        cp .env .next/standalone/
        if [ -d "public" ]; then
          cp -r public/* .next/standalone/public/
        fi
        cp -r .next/static/* .next/standalone/.next/static/

    - name: Deploy to Kripton
      run: |
        /usr/bin/rsync -av --delete \
          -e "ssh -i /home/github-runner/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
          .next/standalone/ \
          deploy@100.76.93.142:/var/www/deaubit/

    - name: Restart PM2
      run: |
        ssh -i /home/github-runner/.ssh/id_ed25519 \
          -o StrictHostKeyChecking=no \
          deploy@100.76.93.142 \
          "cat > /var/www/deaubit/ecosystem.config.js << 'EOFPM2'
        module.exports = {
          apps: [
            {
              name: 'deaubit',
              script: '/var/www/deaubit/server.js',
              cwd: '/var/www/deaubit',
              env: {
                NODE_ENV: 'production',
                PORT: 8888,
                HOSTNAME: '0.0.0.0'
              }
            }
          ]
        }
        EOFPM2
        pm2 reload deaubit || pm2 start /var/www/deaubit/ecosystem.config.js"

    - name: Cleanup
      if: always()
      run: |
        rm -rf $GITHUB_WORKSPACE/.next
        rm -rf $GITHUB_WORKSPACE/node_modules
        rm -f $GITHUB_WORKSPACE/.env
        echo "Cleanup done!"