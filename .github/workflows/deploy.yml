name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── Generate wrangler.toml from example + fill secrets ───
      - name: Configure wrangler.toml
        env:
          DB_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          KV_ID: ${{ secrets.CF_KV_SESSION_ID }}
          APP_HOST: ${{ secrets.APP_HOST }}
          SHORT_HOST: ${{ secrets.SHORT_HOST }}
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: |
          cp worker/wrangler.toml.example worker/wrangler.toml
          sed -i "s|PLACEHOLDER_DB_ID|$DB_ID|g" worker/wrangler.toml
          sed -i "s|PLACEHOLDER_KV_ID|$KV_ID|g" worker/wrangler.toml
          sed -i "s|PLACEHOLDER_APP_HOST|$APP_HOST|g" worker/wrangler.toml
          sed -i "s|PLACEHOLDER_SHORT_HOST|$SHORT_HOST|g" worker/wrangler.toml
          sed -i "s|PLACEHOLDER_TURNSTILE_SITE_KEY|$TURNSTILE_SITE_KEY|g" worker/wrangler.toml
          sed -i "s|PLACEHOLDER_MAIL_FROM|$MAIL_FROM|g" worker/wrangler.toml

      # ── Build Next.js static export ───────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_APP_HOST: ${{ secrets.APP_HOST }}
          NEXT_PUBLIC_SHORT_HOST: ${{ secrets.SHORT_HOST }}
          NEXT_PUBLIC_PROTOCOL: "https"
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}

      # ── Deploy Hono Worker + static assets ────────────────────
      - name: Install worker dependencies
        run: npm ci
        working-directory: worker

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
