name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject config into wrangler.toml
        run: |
          sed -i "s|YOUR_DB_ID|${{ secrets.CF_D1_DATABASE_ID }}|g" wrangler.toml
          sed -i "s|YOUR_KV_ID|${{ secrets.CF_KV_SESSION_ID }}|g" wrangler.toml
          sed -i "s|YOUR_APP_HOST|${{ secrets.APP_HOST }}|g" wrangler.toml
          sed -i "s|YOUR_SHORT_HOST|${{ secrets.SHORT_HOST }}|g" wrangler.toml
          sed -i "s|YOUR_REDIRECT_HOST|${{ secrets.REDIRECT_HOST }}|g" wrangler.toml
          sed -i "s|YOUR_AUTH_URL|${{ secrets.AUTH_URL }}|g" wrangler.toml
          sed -i "s|YOUR_SERVICE_SECRET|${{ secrets.SERVICE_SECRET }}|g" wrangler.toml
          sed -i "s|YOUR_TURNSTILE_SITE_KEY|${{ secrets.TURNSTILE_SITE_KEY }}|g" wrangler.toml

      - name: Build frontend
        run: npm run build
        env:
          VITE_APP_HOST: ${{ secrets.APP_HOST }}
          VITE_SHORT_HOST: ${{ secrets.SHORT_HOST }}
          VITE_PROTOCOL: "https"
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          VITE_AUTH_URL: ${{ secrets.AUTH_URL }}

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
